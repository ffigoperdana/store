services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fgstore
      POSTGRES_USER: fgstore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    volumes:
      - fg_store_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fgstore -d fgstore"]
      interval: 5s
      timeout: 5s
      retries: 20

  store:
    build:
      context: .
      dockerfile: Dockerfile
    image: fg-store:local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fgstore:${POSTGRES_PASSWORD:-local-development-only}@db:5432/fgstore
      SESSION_SECRET: ${SESSION_SECRET:-local-development-session-secret-change-me-32}
      INVENTORY_ENCRYPTION_KEY: ${INVENTORY_ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-owner@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-before-production}
      ADMIN_NAME: ${ADMIN_NAME:-FG Store Owner}
      STORE_WHATSAPP: ${STORE_WHATSAPP:-6281234567890}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      ALLOW_MOCK_PAY: "true"
      COOKIE_SECURE: "false"
      KLIKQRIS_ENV: ${KLIKQRIS_ENV:-sandbox}
      KLIKQRIS_MODE: ${KLIKQRIS_MODE:-PG}
      KLIKQRIS_API_KEY: ${KLIKQRIS_API_KEY:-}
      KLIKQRIS_MERCHANT_ID: ${KLIKQRIS_MERCHANT_ID:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      CHECKOUT_RATE_LIMIT_WINDOW_SECONDS: ${CHECKOUT_RATE_LIMIT_WINDOW_SECONDS:-600}
      CHECKOUT_RATE_LIMIT_IP_MAX: ${CHECKOUT_RATE_LIMIT_IP_MAX:-12}
      CHECKOUT_RATE_LIMIT_PHONE_MAX: ${CHECKOUT_RATE_LIMIT_PHONE_MAX:-5}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-disabled}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-FG Store <orders@mail.fgdev.tech>}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      # Docker-local showcase only. Coolify uses the Dockerfile and remains clean.
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      AUTO_SEED_CATALOG: ${AUTO_SEED_CATALOG:-true}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  fg_store_postgres:
