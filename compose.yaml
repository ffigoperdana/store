services:
  store:
    build:
      context: .
      dockerfile: Dockerfile
    image: fg-store:local
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
